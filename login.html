<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 勿忘心 🌟中控台</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f7f9fa; margin: 0; padding: 0; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: white; border-radius: 12px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 380px; text-align: center; border: 1px solid #eef2f5; box-sizing: border-box; }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; font-weight: bold; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; transition: border-color 0.2s; }
        .input-group input:focus { border-color: #8B5A2B; outline: none; }
        button { width: 100%; padding: 12px; background: #8B5A2B; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #704923; }
        
        .hub-container { max-width: 1000px; width: 100%; margin: 0 auto; padding: 40px 20px; box-sizing: border-box; display: none; }
        
        /* ✨ 重新优化的 Flex 头部布局，右边放置精简小按钮 */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eef2f5; padding-bottom: 20px; margin-bottom: 30px; }
        .header-text { text-align: left; }
        .header h1 { color: #8B5A2B; margin: 0 0 5px 0; font-size: 26px; }
        .header p { margin: 0; color: #888; font-size: 14px; }
        
        /* ✨ 精致微型浅色退出按钮 */
        .logout-btn { width: auto; padding: 6px 12px; background: #fbe9e7; color: #d32f2f; border: 1px solid #ffccbc; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .logout-btn:hover { background: #d32f2f; color: white; border-color: #d32f2f; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eef2f5; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; text-decoration: none; display: block; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); border-color: #8B5A2B; }
        .card h3 { margin: 0 0 10px 0; color: #8B5A2B; font-size: 20px; }
        .card p { margin: 0; color: #666; font-size: 14px; line-height: 1.5; }
        .tag { display: inline-block; padding: 4px 8px; background: #eef2f5; color: #666; font-size: 11px; border-radius: 4px; margin-top: 15px; font-weight: bold; }
        .tag.active { background: #e8f5e9; color: #2e7d32; }
    </style>
    <script src="shops.js"></script>
</head>
<body>

    <div class="login-box" id="login-layer">
        <h2 id="login-title" style="color: #8B5A2B; margin-top: 0; margin-bottom: 25px;">系统安全登入</h2>
        <div class="input-group">
            <label>登录账号</label>
            <input type="text" id="user-input" placeholder="输入管理员或员工账号">
        </div>
        <div class="input-group">
            <label>访问密码</label>
            <input type="password" id="pwd-input" placeholder="输入访问密码">
        </div>
        <button onclick="handleLogin()">安全登入</button>
        <div id="error-msg" style="color: #e74c3c; font-size: 13px; font-weight: bold; margin-top: 15px; display: none; line-height: 1.4;"></div>
    </div>

    <div class="hub-container" id="hub-layer">
        <div class="header">
            <div class="header-text">
                <h1 id="shop-title">商户生态控制台</h1>
                <p>请选择您需要操作或查看的商用子网页系统</p>
            </div>
            <button class="logout-btn" onclick="handleLogout()">登出</button>
        </div>
        
        <div class="grid">
            <a class="card" id="link-cashier" href="#">
                <h3>💰收银系统 (POS)</h3>
                <p>前台订单管理、结账收银、动态开台锁台状态监控与防漏账核心总账端。</p>
                <span class="tag active">生态设备锁保护</span>
            </a>
            <a class="card" id="link-kitchen" href="#">
                <h3>🧾后厨出单看板</h3>
                <p>实时同步顾客订单，厨师核对、菜品即时上菜标记状态中控台。</p>
                <span class="tag active">生态设备锁保护</span>
            </a>
            <a class="card" id="link-order" href="#">
                <h3>📝顾客自助扫码点餐</h3>
                <p>预览点餐静态配置菜单、动态Firebase规格选择及桌号一键下单系统。</p>
                <span class="tag">无需指纹验证</span>
            </a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const shopId = urlParams.get('shop');

        window.onload = () => {
            if (!shopId || !allShopsData[shopId]) {
                document.body.innerHTML = "<h3 style='text-align:center; margin-top:20vh; color:#e74c3c;'>⚠️ 非法访问：请使用专属商家链接登入</h3>";
                return;
            }
            document.getElementById('login-title').innerText = allShopsData[shopId].shopName + " 后台";

            const loginToken = localStorage.getItem(`token_${shopId}`);
            if (loginToken === 'authenticated') {
                showHubLayer(allShopsData[shopId]);
            }
        };

        function generateDeviceFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "top";
                ctx.font = "14px 'Arial'";
                ctx.textHorizontalAlign = "alphabetic";
                ctx.fillStyle = "#f60";
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = "#069";
                ctx.fillText("WealthFlow_Secure_Lock_2026", 2, 15);
                const b64 = canvas.toDataURL().slice(-50);
                let hash = 0;
                for (let i = 0; i < b64.length; i++) {
                    hash = (hash << 5) - hash + b64.charCodeAt(i);
                    hash |= 0;
                }
                return "DEV_" + Math.abs(hash);
            } catch (e) {
                return "DEV_FALLBACK_" + Math.round(Math.random() * 100000);
            }
        }

        function showHubLayer(shopConfig) {
            document.body.style.display = "block"; 
            document.getElementById('login-layer').style.display = "none";
            document.getElementById('hub-layer').style.display = "block";
            
            document.getElementById('shop-title').innerText = shopConfig.shopName + " · 商业生态圈";
            document.getElementById('link-cashier').href = `cashier.html?shop=${shopId}`;
            document.getElementById('link-kitchen').href = `kitchen.html?shop=${shopId}`;
            document.getElementById('link-order').href = `index.html?shop=${shopId}`;
        }

        async function handleLogin() {
            if (!shopId) return; 
            const username = document.getElementById('user-input').value.trim();
            const pwd = document.getElementById('pwd-input').value;
            const shopConfig = allShopsData[shopId];
            const errorEl = document.getElementById('error-msg');
            
            if (!username || !pwd) {
                errorEl.innerText = "请输入完整的账号和密码！";
                errorEl.style.display = 'block';
                return;
            }

            const msgBuffer = new TextEncoder().encode(pwd);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            if (shopConfig && shopConfig.accounts && shopConfig.accounts[username] === hashHex) {
                
                const lockCheckUrl = `https://qr-foor-orders-default-rtdb.asia-southeast1.firebasedatabase.app/shop_status/${shopId}.json`;
                try {
                    const statusResponse = await fetch(lockCheckUrl);
                    const statusData = await statusResponse.json();
                    
                    if (statusData) {
                        if (statusData.isLocked === true) {
                            errorEl.innerText = `❌ 官方制裁：该商户已被中控台依法锁死！\n原因：${statusData.reason || '违规或未按时缴纳系统费'}`;
                            errorEl.style.display = 'block';
                            return; 
                        }
                    } else {
                        await fetch(lockCheckUrl, {
                            method: 'PUT',
                            body: JSON.stringify({ isLocked: false, reason: "未按时缴纳系统维护费" })
                        });
                    }
                } catch (statusErr) {
                    console.error("安全监控链中断", statusErr);
                }

                const deviceId = generateDeviceFingerprint();
                const deviceLockKey = `device_lock_${shopId}_${username}`;
                const checkUrl = `https://qr-foor-orders-default-rtdb.asia-southeast1.firebasedatabase.app/device_locks/${shopId}/${username}.json`;
                
                try {
                    const response = await fetch(checkUrl);
                    const boundDevice = await response.json();
                    
                    if (!boundDevice) {
                        await fetch(checkUrl, {
                            method: 'PUT',
                            body: JSON.stringify({ boundId: deviceId, boundTime: new Date().toLocaleString() })
                        });
                        localStorage.setItem(deviceLockKey, deviceId);
                    } else {
                        const localSavedId = localStorage.getItem(deviceLockKey);
                        if (boundDevice.boundId !== deviceId || localSavedId !== deviceId) {
                            errorEl.innerText = "❌ 越权访问：此账号已绑定其他物理终端，禁止盗用链接！";
                            errorEl.style.display = 'block';
                            return; 
                        }
                    }

                    localStorage.setItem(`token_${shopId}`, 'authenticated');
                    showHubLayer(shopConfig);

                } catch (err) {
                    console.error(err);
                    errorEl.innerText = "🚨 云端安全链路建立失败，请检查网络！";
                    errorEl.style.display = 'block';
                }
            } else {
                errorEl.innerText = "❌ 账号不存在或密码错误！";
                errorEl.style.display = 'block';
            }
        }

        function handleLogout() {
            localStorage.removeItem(`token_${shopId}`);
            window.location.reload();
        }
    </script>
</body>
</html>
