<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 勿忘心 🌟中控台</title>
    <style>
        /* 核心替换：完美复刻点餐前端的温暖手作奶油色系 */
        body { font-family: 'Arial', sans-serif; background-color: #fbf7f0; margin: 0; padding: 40px 20px; color: #5d4037; }
        .admin-container { max-width: 900px; margin: 0 auto; }
        
        h1 { color: #8B5A2B; text-align: center; font-size: 28px; margin-bottom: 10px; font-weight: bold; }
        .subtitle { text-align: center; color: #a1887f; font-size: 14px; margin-bottom: 40px; margin-top: 0; letter-spacing: 1px; }
        
        /* 商家卡片风格：白色圆角、极轻微雅致阴影 */
        .shop-card { background: #ffffff; border-radius: 16px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(139, 90, 43, 0.05); border: 1px solid #f3ebe1; }
        .shop-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #fbf7f0; padding-bottom: 15px; margin-bottom: 20px; }
        .shop-name { font-size: 20px; font-weight: bold; color: #8B5A2B; }
        
        /* 状态标签 */
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; letter-spacing: 0.5px; }
        .status-badge.normal { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .status-badge.locked { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        
        /* 控制区域 */
        .control-group { background: #fdfbf7; padding: 18px; border-radius: 12px; border: 1px solid #f5ede2; }
        .control-group label { display: block; font-size: 13px; color: #8d6e63; margin-bottom: 10px; font-weight: bold; }
        
        /* 输入框：融入烘焙原木色微阴影 */
        .reason-input { width: 100%; padding: 12px; background: #ffffff; border: 1px solid #d7ccc8; color: #5d4037; border-radius: 8px; box-sizing: border-box; margin-bottom: 20px; font-size: 14px; transition: border-color 0.2s; }
        .reason-input:focus { border-color: #8B5A2B; outline: none; }
        
        /* 按钮组：完美复刻标志性深棕色与温暖辅助色 */
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn { flex: 1; min-width: 160px; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.2s; text-align: center; font-size: 14px; }
        
        .btn-lock { background: #d32f2f; color: white; }
        .btn-lock:hover { background: #b71c1c; box-shadow: 0 4px 10px rgba(211, 47, 47, 0.2); }
        
        .btn-unlock { background: #1cc716; color: white; }
        .btn-unlock:hover { background: #14b60e; box-shadow: 0 4px 10px rgba(139, 90, 43, 0.3); }
        
        .btn-clear { background: #f5ede2; color: #8d6e63; border: 1px solid #e0d4c3; }
        .btn-clear:hover { background: #eddcc6; color: #5d4037; }
    </style>
    <script src="shops.js"></script>
</head>
<button onclick="toggleQRPanel()" style="background: #8B5A2B; color: white; border: none; padding: 10px 20px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(139, 90, 43, 0.2);">
        🖼️ 展开 / 隐藏 二维码生成器
    </button>
<body>

    <div class="admin-container">
        <h1>🛠️ 勿忘心 中控总掌权台</h1>

        <div id="shops-management-list"></div>
    </div>
    <div>
   <div id="qr-generator-tab" class="admin-tab-content" style="display: none; padding: 20px;">
        <h3 style="color: #8B5A2B; margin-top: 0;">🖼️ 桌面扫码点餐 二维码生成引擎</h3>
        
        <div style="display: flex; gap: 30px; background: #FFF; border: 1px solid #EFE2D5; border-radius: 12px; padding: 25px; box-shadow: 0 2px 8px rgba(139,90,43,0.05);">
            <div style="flex: 1; display: flex; flex-direction: column; gap: 15px;">
                <div>
                    <label style="font-weight: bold; color: #4A3E3D; display: block; margin-bottom: 6px;">商户 ID (Shop ID):</label>
                    <input type="text" id="qr-shop-id" placeholder="例如: customer_shop_A" style="width: 100%; border: 1px solid #E6D5C5; padding: 10px; border-radius: 8px; background: #FFF; color: #4A3E3D; font-weight: bold; outline: none;">
                </div>
                <div>
                    <label style="font-weight: bold; color: #4A3E3D; display: block; margin-bottom: 6px;">输入桌号 (可输入多个，用逗号隔开):</label>
                    <input type="text" id="qr-table-num" placeholder="例如: A1, A2, A3, 外带" style="width: 100%; border: 1px solid #E6D5C5; padding: 10px; border-radius: 8px; color: #4A3E3D; font-weight: bold; outline: none;">
                </div>
                <button onclick="generateTableQRCode()" style="background: #8B5A2B; color: white; border: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 25px; cursor: pointer; margin-top: 10px;">生成点餐二维码</button>
            </div>
            
            <div style="flex: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px dashed #DCC8B7; padding-left: 30px;">
                <div id="qrcode-display" style="padding: 10px; background: #fff; border: 1px solid #EFE2D5; border-radius: 8px; min-height: 160px; width: 100%; display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-start; justify-content: center;">
                    <span style="color: #999; font-size: 13px; margin-top: 60px;">暂无二维码</span>
                </div>
                <button id="download-qr-btn" onclick="downloadAllQRCodes()" style="display: none; background: #FFFBF7; color: #8B5A2B; border: 1px solid #E6D5C5; padding: 8px 15px; font-size: 13px; font-weight: bold; border-radius: 20px; cursor: pointer; margin-top: 15px;">📥 批量下载图片</button>
            </div>
        </div>
    </div>
    <div id="custom-alert-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(74, 62, 61, 0.6); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(2px);">
        <div style="background: #FAF6F0; width: 80%; max-width: 320px; border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
            <div id="custom-alert-text" style="font-size: 16px; color: #4A3E3D; font-weight: bold; line-height: 1.5; margin-bottom: 24px;">提示内容</div>        
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button id="custom-alert-cancel" onclick="closeCustomAlert()" style="display: none; flex: 1; background: #E6D5C5; color: #633E1A; border: none; padding: 10px 0; font-size: 15px; font-weight: bold; border-radius: 20px; cursor: pointer;">取 消</button>
                <button id="custom-alert-confirm" style="flex: 1; background: #8B5A2B; color: white; border: none; padding: 10px 0; font-size: 15px; font-weight: bold; border-radius: 20px; cursor: pointer;">确 定</button>
            </div>
        </div>
    </div>

    <script>
        const dbUrl = "https://qr-foor-orders-default-rtdb.asia-southeast1.firebasedatabase.app";

        function renderAdminPortal() {
            const listContainer = document.getElementById('shops-management-list');
            listContainer.innerHTML = ""; 

            Object.keys(allShopsData).forEach(shopId => {
                const shopConfig = allShopsData[shopId];
                
                const cardHtml = `
                    <div class="shop-card">
                        <div class="shop-header">
                            <span class="shop-name">🏪 ${shopConfig.shopName} (${shopId})</span>
                            <span class="status-badge" id="badge-${shopId}">同步云端状态...</span>
                        </div>
                        
                        <div class="control-group">
                            <label>拉黑停机锁定理由 (isLocked 为 true 时在前线登录页红字警告显示)</label>
                            <input type="text" id="reason-${shopId}" class="reason-input" value="未按时缴纳系统维护费">
                            
                            <div class="btn-group">
                                <button class="btn btn-lock" onclick="setShopLock('${shopId}', true)">🔒 一键官方死锁封号</button>
                                <button class="btn btn-unlock" onclick="setShopLock('${shopId}', false)">🔓 一键解封恢复营业</button>
                                <button class="btn btn-clear" onclick="clearAllDeviceLocks('${shopId}')">📱 清除全店指纹授权</button>
                            </div>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += cardHtml;
                fetchShopStatus(shopId);
            });
        }

        async function fetchShopStatus(shopId) {
            try {
                const response = await fetch(`${dbUrl}/shop_status/${shopId}.json`);
                const data = await response.json();
                const badge = document.getElementById(`badge-${shopId}`);
                
                if (badge) {
                    if (data && data.isLocked === true) {
                        badge.innerText = "🚨 已依法锁死";
                        badge.className = "status-badge locked";
                        if(data.reason) document.getElementById(`reason-${shopId}`).value = data.reason;
                    } else {
                        badge.innerText = "🟢 正常营业中";
                        badge.className = "status-badge normal";
                    }
                }
            } catch (err) {
                console.error("抓取状态失败", err);
            }
        }

        async function setShopLock(shopId, shouldLock) {
            const reasonText = document.getElementById(`reason-${shopId}`).value.trim();
            const targetUrl = `${dbUrl}/shop_status/${shopId}.json`;
            
            let payload = null;
            if (shouldLock) {
                payload = { isLocked: true, reason: reasonText, lockTime: new Date().toLocaleString() };
            } else {
                payload = { isLocked: false };
            }

            try {
                await fetch(targetUrl, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });
                alert(`操作成功！已同步 ${shopId} 的云端死锁状态。`);
                fetchShopStatus(shopId);
            } catch (err) {
                alert("云端通信失败！");
            }
        }

        async function clearAllDeviceLocks(shopId) {
            if(!confirm(`确定要重置清除 ${shopId} 旗下的所有物理指纹绑定吗？`)) return;
            
            const targetUrl = `${dbUrl}/device_locks/${shopId}.json`;
            try {
                await fetch(targetUrl, { method: 'DELETE' });
                alert("该店设备锁已全部重置成功！");
            } catch (err) {
                alert("重置失败！");
            }
        }

        window.onload = () => {
            renderAdminPortal();
        };

        let activeQRCodeInstance = null;

    function generateTableQRCode() {
        let shopId = document.getElementById('qr-shop-id').value.trim();
        const tableNumRaw = document.getElementById('qr-table-num').value.trim();
        const displayContainer = document.getElementById('qrcode-display');
        const downloadBtn = document.getElementById('download-qr-btn');

        // 🛡️ 自动防呆净化网址
        if (shopId.includes('shop=')) {
            shopId = shopId.split('shop=')[1].split('&')[0];
            document.getElementById('qr-shop-id').value = shopId;
        }

        if (!shopId) return showCustomAlert('⚠️ 请输入商户 ID！');
        if (!tableNumRaw) return showCustomAlert('⚠️ 请输入桌号！');

        displayContainer.innerHTML = ""; 
        const baseUrl = window.location.origin + window.location.pathname.replace('admin.html', 'index.html');
        
        let tables = [];
        const chunks = tableNumRaw.split(/[,，]/).map(t => t.trim()).filter(t => t);
        
        // 🚀 核心批量解析引擎
        chunks.forEach(chunk => {
            const rangeMatch = chunk.match(/^([a-zA-Z]*)(\d+)\s*-\s*([a-zA-Z]*)(\d+)$/);
            if (rangeMatch) {
                const prefix = rangeMatch[1] || rangeMatch[3]; // 智能抓取前缀
                const start = parseInt(rangeMatch[2], 10);
                const end = parseInt(rangeMatch[4], 10);
                
                // 限制最大连续生成数量为 500 避免浏览器崩溃
                if (start <= end && (end - start) <= 500) { 
                    for (let i = start; i <= end; i++) {
                        tables.push(`${prefix}${i}`);
                    }
                    return;
                }
            }
            tables.push(chunk); // 非连号格式直接塞入
        });

        tables.forEach(tableNum => {
            const targetUrl = `${baseUrl}?shop=${shopId}&table=${encodeURIComponent(tableNum)}`;
            const card = document.createElement('div');
            card.style.cssText = "display: flex; flex-direction: column; align-items: center; gap: 8px; background: #FFFBF7; padding: 10px; border: 1px solid #E6D5C5; border-radius: 8px;";
            
            const title = document.createElement('div');
            title.innerText = tableNum;
            title.style.cssText = "font-weight: bold; color: #8B5A2B; font-size: 14px;";
            
            const qrBox = document.createElement('div');
            qrBox.className = "qr-canvas-item";
            qrBox.setAttribute('data-table', tableNum); 
            
            card.appendChild(title);
            card.appendChild(qrBox);
            displayContainer.appendChild(card);

            new QRCode(qrBox, {
                text: targetUrl,
                width: 140,
                height: 140,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        });

        if (downloadBtn && tables.length > 0) downloadBtn.style.display = "block";
    }

    function downloadAllQRCodes() {
        const qrItems = document.querySelectorAll('.qr-canvas-item');
        if (qrItems.length === 0) return;
        
        qrItems.forEach((item, index) => {
            const tableNum = item.getAttribute('data-table');
            const img = item.querySelector('img');
            if (img && img.src) {
                // 设置 300 毫秒间隔排队下载，避免浏览器封杀并发请求
                setTimeout(() => {
                    const link = document.createElement('a');
                    link.href = img.src;
                    link.download = `桌号_${tableNum}_扫码点餐.png`;
                    link.click();
                }, index * 300); 
            }
        });
    }

    function toggleQRPanel() {
        const panel = document.getElementById('qr-generator-tab');
        if (!panel) return;
        
        if (panel.style.display === 'none' || panel.style.display === '') {
            panel.style.display = 'block';
            // 自动填入当前商户 ID
            if (typeof currentShopId !== 'undefined') {
                const shopInput = document.getElementById('qr-shop-id');
                if (shopInput) shopInput.value = currentShopId;
            }
            // 页面自动平滑滚动到生成器位置
            panel.scrollIntoView({ behavior: 'smooth' });
        } else {
            panel.style.display = 'none';
        }
    }
    let onCustomConfirmCallback = null;
    function showCustomAlert(text, isConfirmMode = false, confirmCallback = null) {
        const modal = document.getElementById('custom-alert-modal');
        document.getElementById('custom-alert-text').innerHTML = text;
        onCustomConfirmCallback = confirmCallback;
        
        document.getElementById('custom-alert-cancel').style.display = isConfirmMode ? 'block' : 'none';
        document.getElementById('custom-alert-confirm').onclick = function() {
            if (isConfirmMode && typeof onCustomConfirmCallback === "function") {
                onCustomConfirmCallback();
            }
            closeCustomAlert();
        };
        if (modal) modal.style.display = "flex";
    }
    function closeCustomAlert() {
        const modal = document.getElementById('custom-alert-modal');
        if (modal) modal.style.display = "none";
    }
    </script>
</body>
</html>
